name: debug-packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Choose a tag for the image'
        required: false
        default: 'dev'
        type: choice
        options:
          - dev
          - latest
          - nightly
      version:
        description: 'Enter a version number (e.g., v1.1.0)'
        required: false
        default: ''
        type: string

env:
  REGISTRY_SERVER_ADDRESS: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGE_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Get Ref
        id: get-ref
        run: echo "::set-output name=ref::${{ github.ref }}"

      - name: Determine Tags
        id: determine-tags
        run: |
          tags=""
          ref=$(echo ${{ steps.get-ref.outputs.ref }})
          input_tag=$(echo ${{ github.event.inputs.tag }})
          input_version=$(echo ${{ github.event.inputs.version }})

          # 根据用户输入的 tag 添加标签
          if [[ "$input_tag" != "" ]]; then
            tags="$input_tag"
          fi

          # 如果用户输入了版本号，则添加版本号标签
          if [[ "$input_version" != "" ]]; then
            tags="${tags},${input_version}"
          fi

          # 如果有 GitHub 标签，则添加
          if [[ "$ref" =~ ^refs\/tags\/v.*$ ]]; then
            tag_name=$(echo "$ref" | sed 's/refs\/tags\///')
            tags="${tags},${tag_name}"
          fi

          # 如果没有任何标签，默认使用 dev
          if [[ -z "$tags" ]]; then
            tags="dev"
          fi

          echo "::set-output name=tags::$tags"

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          file: ./docker/Dockerfile
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY_SERVER_ADDRESS }}:${{ steps.determine-tags.outputs.tags }}